# The manifest for the "auth" service.
# Read the full specification for the "Load Balanced Web Service" type at:
#  https://aws.github.io/copilot-cli/docs/manifest/lb-web-service/

# Your service name will be used in naming your resources like log groups, ECS services, etc.
name: auth
type: Load Balanced Web Service

# Distribute traffic to your service.
http:
  # Requests to this path will be forwarded to your service.
  # To match all requests you can use the "/" path.
  path: 'Auth'
  # You can specify a custom health check path. The default is "/".
  healthcheck: '/Auth/Healthcheck'

# Configuration for your containers and service.
image:
  # Docker build arguments. For additional overrides: https://aws.github.io/copilot-cli/docs/manifest/lb-web-service/#image-build
  build:
    dockerfile: Auth/Dockerfile
    context: ./
  # Port exposed through your container to route traffic to it.
  port: 80

cpu: 256       # Number of CPU units for the task.
memory: 512    # Amount of memory in MiB used by the task.
platform: linux/arm64  # See https://aws.github.io/copilot-cli/docs/manifest/lb-web-service/#platform
count: 1       # Number of tasks that should be running in your service.
exec: true     # Enable running commands in your container.

# Optional fields for more advanced use-cases.
#
#variables:                    # Pass environment variables as key value pairs.
#  LOG_LEVEL: info

#secrets:                      # Pass secrets from AWS Systems Manager (SSM) Parameter Store.
#  GITHUB_TOKEN: GITHUB_TOKEN  # The key is the name of the environment variable, the value is the name of the SSM parameter.

# You can override any of the values defined above by environment.
environments:
  dev:
    count: 1               # Number of tasks to run for the "test" environment.
    variables:
      ASPNETCORE_ENVIRONMENT: Development
    secrets:
      AWS__Secret:
        secretsmanager: 'services/auth/dev/env:AWS__Secret::'
      AWS__Key:
        secretsmanager: 'services/auth/dev/env:AWS__Key::'
      AWS__Cognito__ClientId:
        secretsmanager: 'services/auth/dev/env:AWS__Cognito__ClientId::'
      AWS__Cognito__UserPoolId:
        secretsmanager: 'services/auth/dev/env:AWS__Cognito__UserPoolId::'
      AWS__Cognito__Region:
        secretsmanager: 'services/auth/dev/env:AWS__Cognito__Region::'
  testa:
    count: 1
    variables:
      ASPNETCORE_ENVIRONMENT: TestingA
    secrets:
      AWS__Secret:
        secretsmanager: 'services/auth/testa/env:AWS__Secret::'
      AWS__Key:
        secretsmanager: 'services/auth/testa/env:AWS__Key::'
      AWS__Cognito__ClientId:
        secretsmanager: 'services/auth/testa/env:AWS__Cognito__ClientId::'
      AWS__Cognito__UserPoolId:
        secretsmanager: 'services/auth/testa/env:AWS__Cognito__UserPoolId::'
      AWS__Cognito__Region:
        secretsmanager: 'services/auth/testa/env:AWS__Cognito__Region::'
  testb:
    count: 1
    variables:
      ASPNETCORE_ENVIRONMENT: TestingB
    secrets:
      AWS__Secret:
        secretsmanager: 'services/auth/testb/env:AWS__Secret::'
      AWS__Key:
        secretsmanager: 'services/auth/testb/env:AWS__Key::'
      AWS__Cognito__ClientId:
        secretsmanager: 'services/auth/testb/env:AWS__Cognito__ClientId::'
      AWS__Cognito__UserPoolId:
        secretsmanager: 'services/auth/testb/env:AWS__Cognito__UserPoolId::'
      AWS__Cognito__Region:
        secretsmanager: 'services/auth/testb/env:AWS__Cognito__Region::'        